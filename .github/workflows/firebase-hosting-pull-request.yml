name: Deploy to Firebase Hosting on Push
on:
  push:
    branches:
      - master
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. 프론트엔드 폴더로 이동해서 설치 및 빌드 진행
      - name: Install & Build Client
        run: |
          cd client
          npm install
          npm run build
          
      # 2. 빌드된 결과물을 Firebase로 배포
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FICICD }}
          projectId: ficicd
          channelId: live
